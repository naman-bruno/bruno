name: 'Run E2E Tests'
description: 'Setup dependencies, configure environment, and run Playwright E2E tests'
inputs:
  os:
    description: 'Operating system (ubuntu, macos, windows)'
    default: 'ubuntu'
  shell:
    description: 'Shell to use (bash, pwsh)'
    required: false
    default: 'bash'
  shard:
    description: 'Playwright shard, e.g. "1/4". Empty runs the full suite in one job.'
    required: false
    default: ''
  workers:
    description: 'Playwright worker count override (PW_WORKERS). Empty uses the Playwright default.'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Install Test Collection Dependencies
      shell: ${{ inputs.shell }}
      run: npm ci --prefix packages/bruno-tests/collection

    - name: Run Playwright Tests (Ubuntu)
      if: inputs.os == 'ubuntu'
      shell: bash
      env:
        PW_BLOB_REPORT: ${{ inputs.shard != '' && '1' || '' }}
        PW_WORKERS: ${{ inputs.workers }}
      run: xvfb-run dbus-run-session -- npm run test:e2e -- ${{ inputs.shard != '' && format('--shard={0}', inputs.shard) || '' }}

    - name: Run Playwright Tests
      if: inputs.os != 'ubuntu'
      shell: ${{ inputs.shell }}
      env:
        PW_BLOB_REPORT: ${{ inputs.shard != '' && '1' || '' }}
        PW_WORKERS: ${{ inputs.workers }}
      run: npm run test:e2e -- ${{ inputs.shard != '' && format('--shard={0}', inputs.shard) || '' }}

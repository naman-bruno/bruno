name: Windows Tests
on:
  workflow_dispatch:
  push:
    branches: [main, 'release/v*']
  pull_request:
    branches: [main, 'release/v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: Unit Tests (Windows)
    if: false # @TODO: Temporarily disabled. Remove this once the tests are fixed.
    timeout-minutes: 60
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps
        with:
          shell: pwsh

      - name: Run Unit Tests
        uses: ./.github/actions/tests/run-unit-tests
        with:
          shell: pwsh

  cli-test:
    name: CLI Tests (Windows)
    runs-on: windows-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps
        with:
          shell: pwsh

      - name: Run CLI Tests
        uses: ./.github/actions/tests/run-cli-tests
        with:
          shell: pwsh

      - name: Publish Test Report
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always()
        with:
          check_name: CLI Test Results (Windows)
          files: packages/bruno-tests/collection/junit.xml
          comment_mode: off
          check_run: false

  e2e-test:
    name: Playwright E2E Tests (Windows, ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    timeout-minutes: 90
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps
        with:
          shell: pwsh

      - name: Run E2E Tests
        uses: ./.github/actions/tests/run-e2e-tests
        with:
          os: windows
          shell: pwsh
          shard: ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Blob Report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-blob-windows-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 7

  e2e-report:
    name: Playwright E2E Report (Windows)
    needs: e2e-test
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps
        with:
          skip-build: 'true'

      - name: Download Blob Reports
        uses: actions/download-artifact@v6
        with:
          path: all-blob-reports
          pattern: playwright-blob-windows-*
          merge-multiple: true

      - name: Merge Reports
        run: npx playwright merge-reports --reporter html,json ./all-blob-reports
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/results.json

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-windows
          path: playwright-report/
          retention-days: 30

  ssl-test:
    name: SSL Tests (Windows)
    timeout-minutes: 60
    runs-on: windows-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps
        with:
          shell: pwsh

      - name: Setup CA Certificates
        uses: ./.github/actions/ssl/windows/setup-ca-certs

      - name: Run Basic SSL CLI Tests
        uses: ./.github/actions/ssl/windows/run-basic-ssl-cli-tests

      - name: Run Custom CA Certs CLI Tests
        uses: ./.github/actions/ssl/windows/run-custom-ca-certs-cli-tests

      - name: Run Custom CA Certs E2E Tests
        uses: ./.github/actions/ssl/windows/run-ssl-e2e-tests

  oauth1-tests:
    name: OAuth 1.0 Auth Tests (Windows)
    timeout-minutes: 60
    runs-on: windows-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps

      - name: Run Auth E2E Tests
        uses: ./.github/actions/auth/oauth1/windows/run-auth-e2e-tests

      - name: Start Test Server
        uses: ./.github/actions/auth/oauth1/windows/start-test-server

      - name: Run OAuth1 CLI Tests
        uses: ./.github/actions/auth/oauth1/windows/run-oauth1-cli-tests

name: macOS Tests
on:
  workflow_dispatch:
  push:
    branches: [main, 'release/v*']
  pull_request:
    branches: [main, 'release/v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: Unit Tests (macOS)
    timeout-minutes: 60
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps

      - name: Run Unit Tests
        uses: ./.github/actions/tests/run-unit-tests

  cli-test:
    name: CLI Tests (macOS)
    runs-on: macos-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps

      - name: Run CLI Tests
        uses: ./.github/actions/tests/run-cli-tests

      - name: Publish Test Report
        uses: EnricoMi/publish-unit-test-result-action/macos@v2
        if: always()
        with:
          check_name: CLI Test Results (macOS)
          files: packages/bruno-tests/collection/junit.xml
          comment_mode: off
          check_run: false

  e2e-test:
    name: Playwright E2E Tests (macOS, ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    timeout-minutes: 240
    runs-on:
      - macOS
      - self-hosted
      - e2e
    strategy:
      fail-fast: false
      matrix:
        # Shards queue on the self-hosted pool; keep shardTotal <= the number of
        # online runners with these labels, otherwise shards serialize.
        shardIndex: [1, 2]
        shardTotal: [2]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps

      - name: Run E2E Tests
        uses: ./.github/actions/tests/run-e2e-tests
        with:
          os: macos
          shard: ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Blob Report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-blob-macos-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 7

  e2e-report:
    name: Playwright E2E Report (macOS)
    needs: e2e-test
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps
        with:
          skip-build: 'true'

      - name: Download Blob Reports
        uses: actions/download-artifact@v6
        with:
          path: all-blob-reports
          pattern: playwright-blob-macos-*
          merge-multiple: true

      - name: Merge Reports
        run: npx playwright merge-reports --reporter html,json ./all-blob-reports
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/results.json

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-macos
          path: playwright-report/
          retention-days: 30

  ssl-test:
    name: SSL Tests (macOS)
    timeout-minutes: 60
    runs-on: macos-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps

      - name: Setup Feature Dependencies
        uses: ./.github/actions/ssl/macos/setup-feature-specific-deps

      - name: Setup CA Certificates
        uses: ./.github/actions/ssl/macos/setup-ca-certs

      - name: Run Basic SSL CLI Tests
        uses: ./.github/actions/ssl/macos/run-basic-ssl-cli-tests

      - name: Run Custom CA Certs CLI Tests
        uses: ./.github/actions/ssl/macos/run-custom-ca-certs-cli-tests

      - name: Run Custom CA Certs E2E Tests
        uses: ./.github/actions/ssl/macos/run-ssl-e2e-tests

  oauth1-tests:
    name: OAuth 1.0 Auth Tests (macOS)
    timeout-minutes: 60
    runs-on: macos-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps

      - name: Run Auth E2E Tests
        uses: ./.github/actions/auth/oauth1/macos/run-auth-e2e-tests

      - name: Start Test Server
        uses: ./.github/actions/auth/oauth1/macos/start-test-server

      - name: Run OAuth1 CLI Tests
        uses: ./.github/actions/auth/oauth1/macos/run-oauth1-cli-tests